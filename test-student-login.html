<!DOCTYPE html>
<html>
<head>
    <title>Test Student Login</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .error { color: red; margin-top: 10px; }
        .success { color: green; margin-top: 10px; }
        .test-section { margin-top: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>Test Student Login</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" value="student@test.com" required>
        </div>
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" value="password123" required>
        </div>
        <button type="submit">Login</button>
    </form>
    <div id="message"></div>

    <div class="test-section">
        <h3>Test Application</h3>
        <p>After login, click below to test job application:</p>
        <button onclick="testApplication()">Test Apply to Job ID 1</button>
        <div id="appMessage"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    messageDiv.innerHTML = `<div class="success">Login successful! Role: ${data.role}</div>`;
                } else {
                    messageDiv.innerHTML = `<div class="error">Login failed: ${data.error}</div>`;
                }
            } catch (error) {
                messageDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        });

        async function testApplication() {
            const token = localStorage.getItem('token');
            const appMessageDiv = document.getElementById('appMessage');
            
            if (!token) {
                appMessageDiv.innerHTML = '<div class="error">Please login first</div>';
                return;
            }
            
            try {
                const response = await fetch('/api/student/applications', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ job_id: 1 })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    appMessageDiv.innerHTML = `<div class="success">Application successful! ID: ${data.data.id}</div>`;
                } else {
                    appMessageDiv.innerHTML = `<div class="error">Application failed: ${data.error || 'Unknown error'}</div>`;
                }
            } catch (error) {
                appMessageDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
